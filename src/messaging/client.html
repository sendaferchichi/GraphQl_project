<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collab: John & Jane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0b0c10;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .active-user {
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.1);
        }

        canvas {
            touch-action: none;
        }

        .cursor-remote {
            position: absolute;
            pointer-events: none;
            transition: transform 0.1s linear;
            z-index: 50;
        }

        #login-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="flex flex-col p-4 gap-4">

    <!-- Login Overlay -->
    <div id="login-overlay" class="flex items-center justify-center">
        <div class="glass p-10 rounded-[40px] text-center max-w-md w-full shadow-2xl">
            <h2 class="text-3xl font-bold mb-2">Bienvenue</h2>
            <p class="text-gray-400 mb-8 text-sm">Choisissez votre identité pour commencer la collaboration</p>
            <div id="login-options" class="space-y-4">
                <div class="text-xs text-purple-400 animate-pulse">Chargement des utilisateurs...</div>
            </div>
            <div class="text-[10px] text-red-500 mt-4 opacity-50">Note: L'Admin (Aymen) est exclu du board.</div>
        </div>
    </div>
    </div>
    </div>

    <!-- Main Content (Hidden until login) -->
    <header class="h-16 glass rounded-2xl flex items-center justify-between px-6 shrink-0 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-purple-500 to-blue-500"></div>
            <span
                class="font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">REALTIME
                BOARD</span>
            <span id="current-user-badge"
                class="text-[10px] bg-white/10 px-2 py-1 rounded-full text-purple-400 ml-4 font-bold"></span>
        </div>
        <div id="status-text" class="text-xs font-medium text-gray-500">En attente de connexion...</div>
    </header>

    <div class="flex flex-1 gap-4 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-60 glass rounded-3xl flex flex-col shrink-0">
            <div class="p-4 border-b border-white/5 text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">En
                ligne</div>
            <div id="online-users" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </aside>

        <!-- Board -->
        <div id="canvas-container" class="flex-1 glass rounded-[32px] relative overflow-hidden group">
            <canvas id="board"></canvas>
            <!-- Floating Toolbar -->
            <div
                class="absolute bottom-6 left-1/2 -translate-x-1/2 glass px-6 py-3 rounded-2xl flex items-center gap-6 shadow-2xl border-purple-500/20">
                <input type="color" id="colorPicker" value="#a855f7"
                    class="w-6 h-6 rounded-full overflow-hidden bg-transparent cursor-pointer">
                <div class="flex gap-4">
                    <button onclick="setMode('draw')" id="btn-draw"
                        class="text-xs font-bold text-purple-400">Pinceau</button>
                    <button onclick="setMode('erase')" id="btn-erase"
                        class="text-xs font-bold hover:text-red-400">Gomme</button>
                </div>
                <div class="w-px h-4 bg-white/10"></div>
                <button onclick="sendLike()" class="text-xl hover:scale-125 transition active:scale-95">❤️</button>
                <button onclick="clearBoard()"
                    class="text-[10px] text-red-500/60 hover:text-red-500 font-bold">CLEAR</button>
            </div>
        </div>

        <!-- Chat -->
        <div class="w-80 glass rounded-3xl flex flex-col shrink-0">
            <div class="p-4 border-b border-white/5 font-semibold text-xs text-gray-400">Chat Privé</div>
            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <form id="chat-form" class="p-4 bg-white/5 flex gap-2">
                <input type="text" id="chat-input" placeholder="Message..."
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-purple-500">
                <button type="submit" class="bg-purple-600 p-2 rounded-xl">🚀</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        let socket, myId, myName, targetId = null;
        let isDrawing = false, lastX = 0, lastY = 0, mode = 'draw';

        function resize() { canvas.width = container.clientWidth; canvas.height = container.clientHeight; }
        window.onresize = resize; resize();

        function login(userId) {
            document.getElementById('login-overlay').style.display = 'none';
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.host}?userId=${userId}`);

            socket.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'INIT') {
                    myId = msg.data.id; myName = msg.data.username;
                    document.getElementById('current-user-badge').innerText = myName;
                } else if (msg.type === 'USER_LIST') {
                    updateUserList(msg.data);
                } else if (msg.type === 'CHAT') {
                    if (msg.senderId === targetId || msg.senderId === myId) {
                        addMessage(msg);
                    } else {
                        showNotification(msg.senderId);
                    }
                } else if (msg.type === 'DRAW') {
                    if (msg.senderId === targetId) drawLine(msg.data.x1, msg.data.y1, msg.data.x2, msg.data.y2, msg.data.color, msg.data.size);
                    else showNotification(msg.senderId);
                } else if (msg.type === 'CURSOR') {
                    if (msg.senderId === targetId) updateRemoteCursor(msg.senderId, msg.senderName, msg.data.x, msg.data.y);
                } else if (msg.type === 'LIKE') {
                    if (msg.senderId === targetId || msg.senderId === myId) spawnHeart(msg.data.x, msg.data.y);
                } else if (msg.type === 'CLEAR') {
                    if (msg.senderId === targetId) ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else if (msg.type === 'ERROR') {
                    alert(msg.message); window.location.reload();
                }
            };
        }

        const notifications = {};

        function updateUserList(users) {
            const list = document.getElementById('online-users');
            list.innerHTML = users.filter(u => u.id !== myId).map(u => `
                <div onclick="setTarget('${u.id}', '${u.username}')" id="user-${u.id}" 
                     class="p-3 rounded-xl cursor-pointer hover:bg-white/5 transition flex items-center justify-between border border-transparent ${targetId === u.id ? 'active-user' : ''}">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]"></div>
                        <span class="text-sm font-medium">${u.username}</span>
                    </div>
                    <div id="notify-${u.id}" class="w-5 h-5 bg-purple-600 rounded-full text-[10px] flex items-center justify-center font-bold scale-0 transition-transform">!</div>
                </div>
            `).join('');

            // Restaurer les points de notification si la liste est rafraîchie
            Object.keys(notifications).forEach(id => {
                if (notifications[id] && id !== targetId) {
                    const el = document.getElementById(`notify-${id}`);
                    if (el) el.classList.remove('scale-0');
                }
            });
        }

        function setTarget(id, name) {
            targetId = id;
            notifications[id] = false; // Effacer notification
            const notifyEl = document.getElementById(`notify-${id}`);
            if (notifyEl) notifyEl.classList.add('scale-0');

            document.getElementById('status-text').innerText = `Session avec ${name}`;
            document.getElementById('status-text').className = 'text-xs font-bold text-purple-400';

            // Mettre à jour l'UI de la liste
            document.querySelectorAll('#online-users > div').forEach(el => el.classList.remove('active-user'));
            document.getElementById(`user-${id}`).classList.add('active-user');

            document.getElementById('messages').innerHTML = `<div class="text-center text-[10px] text-gray-500 uppercase tracking-widest py-4">Connexion établie avec ${name}</div>`;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function showNotification(senderId) {
            if (senderId === targetId) return;
            notifications[senderId] = true;
            const el = document.getElementById(`notify-${senderId}`);
            if (el) el.classList.remove('scale-0');
        }

        let currentUsers = []; // Cache to allow re-render on selection
        const originalUpdateUserList = updateUserList;
        updateUserList = (users) => { currentUsers = users; originalUpdateUserList(users); };

        function send(type, data) { if (targetId || type === 'CURSOR') socket.send(JSON.stringify({ type, targetId, data })); }

        function drawLine(x1, y1, x2, y2, color, size) {
            ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = size; ctx.lineCap = 'round';
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        }

        container.onmousedown = (e) => { if (!targetId) return; isDrawing = true;[lastX, lastY] = [e.offsetX, e.offsetY]; };
        container.onmousemove = (e) => {
            send('CURSOR', { x: e.offsetX, y: e.offsetY });
            if (!isDrawing) return;
            const color = mode === 'erase' ? '#0b0c10' : document.getElementById('colorPicker').value;
            const size = mode === 'erase' ? 40 : 4;
            drawLine(lastX, lastY, e.offsetX, e.offsetY, color, size);
            send('DRAW', { x1: lastX, y1: lastY, x2: e.offsetX, y2: e.offsetY, color, size });
            [lastX, lastY] = [e.offsetX, e.offsetY];
        };
        window.onmouseup = () => isDrawing = false;

        function setMode(m) { mode = m; document.getElementById('btn-draw').className = mode === 'draw' ? 'text-xs font-bold text-purple-400' : 'text-xs font-bold hover:text-purple-400'; document.getElementById('btn-erase').className = mode === 'erase' ? 'text-xs font-bold text-red-400' : 'text-xs font-bold hover:text-red-400'; }
        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); send('CLEAR', {}); }

        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault(); const input = document.getElementById('chat-input');
            if (!input.value.trim() || !targetId) return;
            send('CHAT', { text: input.value }); input.value = '';
        };

        function addMessage(msg) {
            const chat = document.getElementById('messages');
            const isMe = msg.senderId === myId;
            const div = document.createElement('div');
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            div.innerHTML = `<div class="px-3 py-2 rounded-2xl text-xs ${isMe ? 'bg-purple-600 shadow-lg shadow-purple-500/20' : 'bg-white/5 border border-white/10 text-gray-300'}">${msg.data.text}</div>`;
            chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
        }

        function sendLike() { const x = Math.random() * canvas.width; const y = canvas.height - 50; spawnHeart(x, y); send('LIKE', { x, y }); }
        function spawnHeart(x, y) { const h = document.createElement('div'); h.className = 'heart-pop text-2xl'; h.style.left = x + 'px'; h.style.top = y + 'px'; h.innerText = '❤️'; container.appendChild(h); setTimeout(() => h.remove(), 1000); }

        const remoteCursors = {};
        function updateRemoteCursor(id, name, x, y) {
            if (!remoteCursors[id]) {
                const el = document.createElement('div'); el.className = 'cursor-remote flex flex-col items-center';
                el.innerHTML = `<div class="text-xl">📍</div><span class="text-[8px] bg-purple-600 px-2 py-0.5 rounded-full text-white font-bold shadow-lg">${name}</span>`;
                container.appendChild(el); remoteCursors[id] = el;
            }
            remoteCursors[id].style.transform = `translate(${x}px, ${y}px)`;
        }

        // Charger les utilisateurs pour le login
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                const container = document.getElementById('login-options');
                container.innerHTML = users.map(u => `
                    <button onclick="login('${u.id}')" class="w-full p-4 glass rounded-2xl hover:bg-purple-600 transition flex items-center justify-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-blue-500 flex items-center justify-center font-bold text-sm">
                            ${u.name.substring(0, 2).toUpperCase()}
                        </div>
                        <div class="text-left">
                            <div class="font-semibold text-sm">${u.name}</div>
                            <div class="text-[9px] opacity-60">ID: ${u.id} • ${u.email}</div>
                        </div>
                    </button>
                `).join('');
            } catch (err) {
                document.getElementById('login-options').innerHTML = '<div class="text-red-500 text-xs">Erreur de chargement</div>';
            }
        }
        loadUsers();
    </script>
</body>

</html>
